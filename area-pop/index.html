<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7fb" />
    <title>Area Pop</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='25' fill='%2331aa78'/%3E%3Ccircle cx='42' cy='42' r='13' fill='%23000000' fill-opacity='.12'/%3E%3Ccircle cx='22' cy='21' r='8' fill='%23ffffff' fill-opacity='.62'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="Game status">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>Area Pop</h1>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <span>Score</span>
            <strong id="scoreLabel">0</strong>
          </div>
          <div class="stat">
            <span>Best</span>
            <strong id="bestLabel">0</strong>
          </div>
        </div>
        <div class="play-footer">
          <div class="time-meter" aria-label="Time remaining">
            <div class="time-meter-head">
              <span>Time</span>
              <strong id="timeLabel">60</strong>
            </div>
            <div class="time-bar">
              <span id="timeFill"></span>
            </div>
          </div>
          <button id="newButton" class="icon-tool" type="button" aria-label="Reset game">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 12a8 8 0 1 1-2.3-5.6" />
              <path d="M20 4v6h-6" />
            </svg>
          </button>
          <button id="soundButton" class="icon-tool" type="button" aria-label="Toggle sound" aria-pressed="true">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 9v6h4l5 4V5L8 9H4Z" />
              <path d="M16.5 8.5a5 5 0 0 1 0 7" />
              <path d="M19 6a8 8 0 0 1 0 12" />
            </svg>
          </button>
        </div>
      </section>

      <section class="play">
        <div id="board" class="board" aria-label="Area Pop board"></div>
        <div id="toast" class="toast" role="status" aria-live="polite"></div>
      </section>

      <section id="overlay" class="overlay" hidden>
        <div class="result">
          <span>Game Over</span>
          <strong id="finalScore">0</strong>
          <button id="againButton" class="tool primary" type="button">Again</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
