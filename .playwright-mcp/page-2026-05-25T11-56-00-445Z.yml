    - paragraph [ref=e718]: The same pattern appears in the high-dimensional visual setting. Image Editing requires the model to infer brightness, hue, flip, rotation, and masking operations directly from pixels. NEO achieves lower reconstruction error across compositional and length OOD regimes, supporting the interpretation that it explains target images through executable primitive edits rather than a single monolithic vector program.
