    - paragraph [ref=e506]: "In practice, exact marginalization over programs is intractable, so NEO uses a variational posterior (q_\\phi(\\tau,s\\mid x,y)). The posterior acts as a goal-conditioned theory programmer: from the current latent state and target observation, it selects the next primitive that moves the execution trace toward an explanation of the target."
