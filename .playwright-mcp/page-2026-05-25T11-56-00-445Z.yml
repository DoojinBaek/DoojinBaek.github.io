    - paragraph [ref=e727]: "The left visualization shows that NEO selects an explanation length that matches the underlying transformation. A one-step phenomenon receives a short explanation, while a two-step phenomenon is explained by two primitive actions. The right visualization shows why this matters: for a compositional OOD transformation, baselines generate the target through a single entangled vector program, while NEO explains the same change as a sequence of learned primitive actions."
    - heading "Analysis" [level=2] [ref=e728]
    - paragraph [ref=e729]: A central piece of evidence for L2T is whether the learned codes recover primitive structure rather than memorizing observed composite transformations. In low-(\alpha) settings, some primitives are never observed in isolation. A model that memorizes observed transformations can only learn entangled composite actions. NEO instead recovers primitive-level codes and composes them into multi-step programs.
