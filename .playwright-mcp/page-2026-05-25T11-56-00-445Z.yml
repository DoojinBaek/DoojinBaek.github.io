    - heading "Takeaway" [level=2] [ref=e737]
    - paragraph [ref=e738]: L2T reframes world modeling around explanation rather than prediction alone. The model is not asked only to forecast observations; it is asked to infer compact executable mechanisms that explain what changed and reuse those mechanisms in new contexts.
    - paragraph [ref=e739]: "NEO provides a first proof of concept. It learns latent primitives without program supervision, composes them into executable theories, transfers inferred programs to new inputs, and improves further through test-time sampling. The current setting is still controlled: primitives are discrete, programs are short, and the benchmarks are synthetic. Extending L2T to richer environments with stochastic dynamics, partial observability, and open-ended theory spaces is the next step."
