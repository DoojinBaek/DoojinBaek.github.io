    - paragraph [ref=e678]: "The parameter (\\alpha\\in{0.33,0.66,1.00}) controls the fraction of short programs included in training. Smaller (\\alpha) creates a harder setting where some primitives are never observed in isolation and must be discovered by decomposing entangled multi-step transitions."
    - heading "Results" [level=2] [ref=e679]
    - paragraph [ref=e680]: The main failure mode is the gap between self-explainability and transferability. Monolithic latent baselines can often reconstruct the support target, but the same latent action does not transfer to a query input. This indicates that the model has encoded instance-specific information rather than a reusable theory.
    - paragraph [ref=e681]: NEO consistently improves transferability by representing explanations as sequences of learned primitives. NEO-S further improves out-of-distribution performance by sampling multiple candidate theories at test time and selecting a program that best explains the support transition.
    - generic [ref=e682]:
      - figure "Performance comparison on the GridWorld environment." [ref=e683]:
        - img "GridWorld performance table" [ref=e684]
        - generic [ref=e685]: Performance comparison on the GridWorld environment.
      - figure "Performance comparison on the Arithmetic Factorization Reasoning task." [ref=e686]:
        - img "Arithmetic Factorization performance table" [ref=e687]
        - generic [ref=e688]: Performance comparison on the Arithmetic Factorization Reasoning task.
    - paragraph [ref=e689]: On GridWorld, monolithic baselines perform well in-distribution but collapse on compositional and length OOD splits. NEO maintains strong transfer, and NEO-S approaches near-perfect transfer by sampling candidate programs. Arithmetic Factorization is stricter because successful transfer requires exact multi-step symbolic execution. NEO learns reusable multiplicative primitives, and NEO-S substantially improves length OOD performance by searching over compositions of the learned primitive set.
