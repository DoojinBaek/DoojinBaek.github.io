    - figure "Learning-to-Theorize (L2T) framework. From raw before-and-after observation pairs, L2T aims to recover reusable primitives and compose them into executable theories. Once a model learns such primitives, novel phenomena can be explained by recombining them; memorized composite representations fail when the required composition was never observed." [ref=e24]:
      - img "Learning to Theorize framework overview" [ref=e25]
      - generic [ref=e26]:
        - strong [ref=e27]: Learning-to-Theorize (L2T) framework.
        - text: From raw before-and-after observation pairs, L2T aims to recover reusable primitives and compose them into executable theories. Once a model learns such primitives, novel phenomena can be explained by recombining them; memorized composite representations fail when the required composition was never observed.
    - heading "Abstract" [level=2] [ref=e28]
    - paragraph [ref=e29]:
      - text: "What does it mean to understand the world? Contemporary world models often operationalize understanding as accurate future prediction in latent or observation space. Developmental cognitive science suggests a different view: human understanding emerges through the construction of internal theories of how the world works. Inspired by this theory-building view, we introduce"
      - strong [ref=e30]: Learning-to-Theorize (L2T)
      - text: ", a learning paradigm for inferring explicit explanatory theories from raw, non-textual observations."
    - paragraph [ref=e31]:
      - text: We instantiate L2T with
      - strong [ref=e32]: Neural Theorizer (NEO)
      - text: ", a probabilistic neural model that induces latent programs as a learned Language of Thought and executes them through a shared transition model. In NEO, a theory is represented as an executable, compositional program whose learned primitives can be systematically recombined to explain novel phenomena. Experiments show that this formulation enables"
      - strong [ref=e33]: explanation-driven generalization
      - text: ": observations can be understood in terms of the programs that generate them, not only reconstructed as outputs."
    - heading "Learning-to-Theorize Framework" [level=2] [ref=e34]
    - paragraph [ref=e35]:
      - text: Most AI systems are trained to predict, reconstruct, or solve a task. These objectives can succeed without discovering the mechanism that generated the observation. A model may learn that one image maps to another, or that one integer maps to another, while still failing to recover the reusable operation behind the change.
      - strong [ref=e36]: Learning-to-Theorize (L2T)
      - text: "changes the target of learning: the model should infer an executable theory of the change itself."
