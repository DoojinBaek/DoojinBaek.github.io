    - paragraph [ref=e1383]: "The left visualization shows that NEO selects an explanation length that matches the underlying transformation. A one-step phenomenon receives a short explanation, while a two-step phenomenon is explained by two primitive actions. The right visualization shows why this matters: for a compositional OOD transformation, baselines generate the target through a single entangled vector program, while NEO explains the same change as a sequence of learned primitive actions."
    - heading "Analysis" [level=2] [ref=e1384]
    - paragraph [ref=e1385]:
      - text: A central piece of evidence for L2T is whether the learned codes recover primitive structure rather than memorizing observed composite transformations. In low-
      - generic [ref=e1387]:
