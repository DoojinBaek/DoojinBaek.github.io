    - heading "Observation-to-Theory Induction Benchmark" [level=2] [ref=e1274]
    - paragraph [ref=e1275]:
      - text: We introduce the
      - strong [ref=e1276]: Observation-to-Theory Induction Benchmark (OTIB)
      - text: to evaluate whether a model can infer reusable primitives from raw observation pairs without supervision. Each test instance contains a support transition and a query transition generated by the same hidden program. A successful model must infer a theory from the support pair and execute it on the query input.
    - paragraph [ref=e1277]:
      - text: OTIB separates three regimes.
      - strong [ref=e1278]: In-distribution
      - text: tests held-out examples from observed program support.
      - strong [ref=e1279]: Compositional OOD
      - text: holds out program compositions within the same length range.
      - strong [ref=e1280]: Length OOD
      - text: "uses programs longer than those seen during training. The split is designed so that reconstruction alone is insufficient: a model can explain the support pair while still failing to transfer the inferred mechanism."
    - figure "Observation-to-Theory Induction Benchmark (OTIB). We evaluate L2T across GridWorld, Arithmetic Factorization, and Image Editing. Each domain hides a small set of primitives and tests whether models can recover and recombine them from observation pairs alone." [ref=e1281]:
