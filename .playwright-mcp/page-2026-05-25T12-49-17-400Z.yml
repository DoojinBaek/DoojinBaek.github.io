    - heading "Results" [level=2] [ref=e1335]
    - paragraph [ref=e1336]: The main failure mode is the gap between self-explainability and transferability. Monolithic latent baselines can often reconstruct the support target, but the same latent action does not transfer to a query input. This indicates that the model has encoded instance-specific information rather than a reusable theory.
    - paragraph [ref=e1337]: NEO consistently improves transferability by representing explanations as sequences of learned primitives. NEO-S further improves out-of-distribution performance by sampling multiple candidate theories at test time and selecting a program that best explains the support transition.
    - generic [ref=e1338]:
      - figure "Performance comparison on the GridWorld environment." [ref=e1339]:
        - img "GridWorld performance table" [ref=e1340]
        - generic [ref=e1341]: Performance comparison on the GridWorld environment.
      - figure "Performance comparison on the Arithmetic Factorization Reasoning task." [ref=e1342]:
        - img "Arithmetic Factorization performance table" [ref=e1343]
        - generic [ref=e1344]: Performance comparison on the Arithmetic Factorization Reasoning task.
    - paragraph [ref=e1345]: On GridWorld, monolithic baselines perform well in-distribution but collapse on compositional and length OOD splits. NEO maintains strong transfer, and NEO-S approaches near-perfect transfer by sampling candidate programs. Arithmetic Factorization is stricter because successful transfer requires exact multi-step symbolic execution. NEO learns reusable multiplicative primitives, and NEO-S substantially improves length OOD performance by searching over compositions of the learned primitive set.
